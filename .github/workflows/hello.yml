name: Hello Shrimp

on:
  workflow_dispatch:
    inputs:
      task:
        description: '想叫蝦蝦做什麼'
        required: true
        default: '幫我整理今天的重點'

permissions:
  contents: write

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate note with OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          mkdir -p notes

          python - <<'PY'
          import os
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone, timedelta

          api_key = os.environ["OPENROUTER_API_KEY"]
          task = os.environ["TASK"]

          url = "https://openrouter.ai/api/v1/chat/completions"
          data = {
              "model": "openrouter/free",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一隻雲端小龍蝦助理，請用繁體中文回覆，並輸出成適合 Markdown 筆記保存的內容，格式請包含：1. 重點摘要 2. 詳細內容 3. 可執行建議。"
                  },
                  {
                      "role": "user",
                      "content": task
                  }
              ]
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(data).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com/ticko22222-prog/openclew",
                  "X-OpenRouter-Title": "Manting Shrimp"
              }
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode("utf-8"))

          text = result["choices"][0]["message"]["content"].strip()

          tw_time = datetime.now(timezone(timedelta(hours=8)))
          date_str = tw_time.strftime("%Y-%m-%d")
          time_str = tw_time.strftime("%H-%M-%S")
          created_at = tw_time.strftime("%Y-%m-%d %H:%M:%S %z")

          slug = task.strip()
          slug = re.sub(r'[\\\\/:*?"<>|]+', '', slug)
          slug = re.sub(r'\s+', '-', slug)
          slug = slug[:30].strip('-')
          if not slug:
              slug = "shrimp-note"

          title = task[:40].strip() or "蝦蝦筆記"
          filename = f"notes/{date_str}_{time_str}_{slug}.md"

          lines = [
              "---",
              f'title: "{title}"',
              f'date: "{created_at}"',
              'source: "GitHub Actions + OpenRouter"',
              f'task: "{task.replace(chr(34), chr(39))}"',
              "tags:",
              "  - shrimp-note",
              "  - ai-generated",
              "---",
              "",
              f"# {title}",
              "",
              "## 任務",
              task,
              "",
              "## 重點摘要",
              "- 本筆記由蝦蝦自動生成",
              f"- 建立時間：{created_at}",
              f"- 檔案位置：`{filename}`",
              "",
              "## 內容",
              text,
              ""
          ]

          content = "\n".join(lines)

          with open(filename, "w", encoding="utf-8") as
