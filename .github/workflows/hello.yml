name: Hello Shrimp

on:
  workflow_dispatch:
    inputs:
      task:
        description: '想叫蝦蝦做什麼'
        required: true
        default: '幫我整理今天的重點'

permissions:
  contents: write

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate note with OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          mkdir -p notes

          python - <<'PY'
          import os, json, urllib.request, urllib.error
          from datetime import datetime

          api_key = os.environ["OPENROUTER_API_KEY"]
          task = os.environ["TASK"]

          url = "https://openrouter.ai/api/v1/chat/completions"
          data = {
              "model": "openrouter/free",
              "messages": [
                  {"role": "system", "content": "你是一隻雲端小龍蝦助理，請用繁體中文整理內容，格式清楚，適合存成 Markdown 筆記。"},
                  {"role": "user", "content": task}
              ]
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(data).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com/ticko22222-prog/openclew",
                  "X-OpenRouter-Title": "Manting Shrimp"
              }
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode("utf-8"))

          text = result["choices"][0]["message"]["content"]

          now = datetime.utcnow().strftime("%Y-%m-%d_%H-%M-%S")
          filename = f"notes/{now}.md"

          content = f"""# 蝦蝦筆記

          ## 任務
          {task}

          ## 回覆
          {text}
          """

          with open(filename, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"已建立檔案: {filename}")
          PY

      - name: Commit and push note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/
          git diff --cached --quiet || git commit -m "add shrimp note"
          git push
